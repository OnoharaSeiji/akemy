<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .notfound {
      max-width: 680px;
      background: #fff;
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
      text-align: center;
    }
    .notfound h1 {
      margin-top: 0;
      font-size: 42px;
    }
    .notfound p {
      color: #475569;
      font-size: 18px;
      line-height: 1.6;
    }
    .notfound a {
      display: inline-block;
      margin-top: 18px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="notfound">
    <h1>404</h1>
    <p>Esta página não existe ou ainda não foi publicada.</p>
    <p>Volte para o cronograma principal da Akemy.</p>
    <a href="./">Voltar ao cronograma</a>
  </div>
</body>
</html>
