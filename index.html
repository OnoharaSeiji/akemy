<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akemy Estudos · Calendário</title>
  <meta name="description" content="Calendário mensal do ciclo de estudos do Akemy.">
  <link rel="stylesheet" href="style.css">
  <style>
    .calendar-only-shell{padding:24px 0 40px}
    .calendar-only-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:var(--shadow);
    }
    .calendar-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .calendar-head h1{
      margin:8px 0 4px;
      font-size:clamp(1.8rem,3vw,2.6rem);
      line-height:1.08;
      max-width:none;
    }
    .calendar-head p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      max-width:60ch;
    }
    .month-nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }
    .month-title{
      font-size:clamp(1.2rem,2.4vw,1.8rem);
      font-weight:800;
      color:var(--text);
      text-align:center;
      flex:1;
    }
    .weekday-row{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:10px;
      margin-bottom:10px;
    }
    .weekday{
      text-align:center;
      color:var(--soft);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:800;
      padding-bottom:4px;
    }
    .month-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:10px;
    }
    .day-cell{
      min-height:170px;
      border-radius:18px;
      border:1px solid rgba(31,41,55,.08);
      background:#fff;
      padding:12px;
      display:flex;
      flex-direction:column;
    }
    .day-cell.empty{
      background:transparent;
      border-style:dashed;
    }
    .day-topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:10px;
    }
    .day-number{
      font-weight:800;
      font-size:18px;
      color:var(--text);
    }
    .day-badge{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.09em;
      padding:6px 8px;
      border-radius:999px;
      background:#f8fafc;
      color:var(--concept);
      border:1px solid rgba(31,41,55,.08);
      white-space:nowrap;
    }
    .day-study{
      font-size:14px;
      line-height:1.45;
      font-weight:700;
      color:var(--text);
    }
    .day-theme{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }
    .day-link{
      margin-top:auto;
      display:inline-flex;
      font-weight:700;
      text-decoration:none;
      color:var(--concept);
    }
    .day-link.disabled{
      color:var(--soft);
    }
    .mode-conteudo{background:linear-gradient(180deg, rgba(36,59,107,.08), rgba(255,255,255,1))}
    .mode-revisao{background:linear-gradient(180deg, rgba(233,216,166,.42), rgba(255,255,255,1))}
    .mode-mini_simulado{background:linear-gradient(180deg, rgba(47,111,94,.10), rgba(255,255,255,1))}
    .mode-descanso{background:linear-gradient(180deg, rgba(109,86,201,.08), rgba(255,255,255,1))}
    .toolbar-note{
      margin-top:18px;
      color:var(--soft);
      font-size:.92rem;
      text-align:center;
    }
    @media (max-width:900px){
      .weekday-row,.month-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    }
    @media (max-width:680px){
      .weekday-row,.month-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .day-cell{min-height:130px}
      .calendar-head{align-items:flex-start}
      .month-nav{gap:8px}
    }
  </style>
</head>
<body>
  <main class="container calendar-only-shell">
    <section class="calendar-only-card">
      <div class="calendar-head">
        <div>
          <div class="section-title">Calendário</div>
          <h1>Visão mensal do ciclo</h1>
          <p>Navegue pelos meses do plano e abra a apostila do dia diretamente pelo calendário.</p>
        </div>
      </div>

      <div class="month-nav">
        <button class="btn btn-ghost" id="prev-month">◀</button>
        <div class="month-title" id="month-title">—</div>
        <button class="btn btn-ghost" id="next-month">▶</button>
      </div>

      <div class="weekday-row" id="weekday-row"></div>
      <div class="month-grid" id="month-grid"></div>
      <p class="toolbar-note">Somente os dias já publicados mostram o link de abertura.</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    const cfg = window.AKEMY_CONFIG;
    const helpers = window.AKEMY_HELPERS;
    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const weekdayNames = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

    let state = {
      currentMonth: 2,
      currentYear: 2026
    };

    function isAvailable(dayNumber) {
      return cfg.availableApostilas.includes(dayNumber);
    }

    async function resourceExists(path) {
      try {
        const head = await fetch(`${path}?v=${Date.now()}`, { method: 'HEAD', cache: 'no-store' });
        if (head.ok) return true;
      } catch (e) {}

      try {
        const get = await fetch(`${path}?v=${Date.now()}`, { cache: 'no-store' });
        return get.ok;
      } catch (e) {
        return false;
      }
    }

    async function detectAvailableApostilas() {
      if (!cfg.autoDetectApostilas) {
        cfg.availableApostilas = Array.isArray(cfg.availableApostilas) ? cfg.availableApostilas : [];
        return;
      }

      const published = [];
      const orderedDays = cfg.studyDays
        .filter(day => day.mode !== 'descanso')
        .sort((a, b) => a.number - b.number);

      for (const day of orderedDays) {
        const exists = await resourceExists(day.href);
        if (!exists) break;
        published.push(day.number);
      }

      cfg.availableApostilas = published;
    }

    function renderWeekdays() {
      const wrap = document.getElementById('weekday-row');
      wrap.innerHTML = weekdayNames.map(name => `<div class="weekday">${name}</div>`).join('');
    }

    function renderCalendar() {
      const grid = document.getElementById('month-grid');
      grid.innerHTML = '';

      const firstDay = new Date(state.currentYear, state.currentMonth, 1);
      const lastDay = new Date(state.currentYear, state.currentMonth + 1, 0);
      const offset = firstDay.getDay();
      document.getElementById('month-title').textContent = `${monthNames[state.currentMonth]} de ${state.currentYear}`;

      for (let i = 0; i < offset; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        grid.appendChild(empty);
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const currentDate = new Date(state.currentYear, state.currentMonth, day);
        const iso = currentDate.toISOString().slice(0, 10);
        const study = helpers.getStudyDayByIso(iso);
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        if (!study) {
          cell.innerHTML = `<div class="day-number">${day}</div><div class="day-theme">fora do plano</div>`;
          grid.appendChild(cell);
          continue;
        }

        const available = study.mode !== 'descanso' && isAvailable(study.number);
        cell.classList.add(`mode-${study.mode}`);

        cell.innerHTML = `
          <div class="day-topline">
            <div class="day-number">${day}</div>
            <div class="day-badge">${study.mode.replace('_',' ')}</div>
          </div>
          <div class="day-study">${study.mode === 'descanso' ? study.title : `#${helpers.formatDayNumber(study.number)} · ${study.title}`}</div>
          <div class="day-theme">${study.theme}</div>
          ${study.mode === 'descanso'
            ? `<span class="day-link disabled">pausa</span>`
            : available
              ? `<a class="day-link" href="${study.href}">abrir apostila</a>`
              : `<span class="day-link disabled">em breve</span>`}
        `;
        grid.appendChild(cell);
      }
    }

    function changeMonth(step) {
      let nextMonth = state.currentMonth + step;
      let nextYear = state.currentYear;

      if (nextMonth < 0) { nextMonth = 11; nextYear--; }
      if (nextMonth > 11) { nextMonth = 0; nextYear++; }

      if (nextYear !== 2026) return;
      if (nextMonth < 2 || nextMonth > 10) return;

      state.currentMonth = nextMonth;
      state.currentYear = nextYear;
      renderCalendar();
    }

    document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
    document.getElementById('next-month').addEventListener('click', () => changeMonth(1));

    async function bootstrap() {
      renderWeekdays();
      await detectAvailableApostilas();
      renderCalendar();
    }

    bootstrap();
  </script>
</body>
</html>
